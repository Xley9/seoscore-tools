<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  width: 400px; height: 400px;
  display: flex; align-items: center; justify-content: center;
  background: white;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
}
.logo-wrap {
  display: flex; flex-direction: column; align-items: center; gap: 20px;
}
.icon {
  width: 180px; height: 180px;
  background: linear-gradient(135deg, #4F46E5, #7C3AED);
  border-radius: 40px;
  display: flex; align-items: center; justify-content: center;
}
.icon svg { width: 120px; height: 120px; }
.text {
  font-size: 36px; font-weight: 800; color: #1a1a2e; letter-spacing: -1px;
}
.text span { color: #7C3AED; }
</style>
</head>
<body>
  <div class="logo-wrap">
    <div class="icon">
      <svg viewBox="0 0 32 32">
        <circle cx="16" cy="16" r="14" fill="none" stroke="white" stroke-width="2"/>
        <path d="M16 6 L16 16 L24 20" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
        <circle cx="16" cy="16" r="2.5" fill="white"/>
      </svg>
    </div>
    <div class="text">seoscore<span>.tools</span></div>
  </div>
</body>
</html>
