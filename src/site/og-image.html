<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  width: 1200px; height: 630px;
  background: linear-gradient(135deg, #4F46E5, #7C3AED);
  display: flex; align-items: center; justify-content: center;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  color: white;
}
.card {
  text-align: center;
  padding: 60px;
}
.logo {
  font-size: 28px; font-weight: 700; letter-spacing: -0.3px;
  margin-bottom: 32px; opacity: 0.9;
}
.logo span { opacity: 0.7; }
h1 {
  font-size: 64px; font-weight: 800; line-height: 1.15;
  margin-bottom: 24px; letter-spacing: -2px;
}
p {
  font-size: 28px; opacity: 0.85; font-weight: 500;
  margin-bottom: 40px;
}
.badges {
  display: flex; gap: 16px; justify-content: center;
}
.badge {
  padding: 10px 24px; border-radius: 100px;
  background: rgba(255,255,255,0.15); backdrop-filter: blur(10px);
  font-size: 18px; font-weight: 600; letter-spacing: 0.5px;
}
</style>
</head>
<body>
  <div class="card">
    <div class="logo">seoscore<span>.tools</span></div>
    <h1>Free SEO, AEO & GEO Scanner</h1>
    <p>136 checks in one scan. No signup required.</p>
    <div class="badges">
      <span class="badge">SEO Score</span>
      <span class="badge">AEO Score</span>
      <span class="badge">GEO Score</span>
    </div>
  </div>
</body>
</html>
